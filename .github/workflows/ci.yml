name: SkillBridge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
      - run: npm install
      - run: npm run check:backend
      - uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}-${{ hashFiles('frontend/app/**/*', 'frontend/components/**/*', 'frontend/lib/**/*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}-
      - run: npm run build
